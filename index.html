<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Врятувати рядового Раяна</title>

<link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  overflow: visible;
  font-family: "Russo One", Arial, sans-serif;
}

.scene {
  width: 736px;
  height: 575px;
  position: relative;
  overflow: visible;
  padding: 35px 36px 45px 36px;
  box-sizing: border-box;
}

.widget {
  width: 664px;
  height: 490px;
  position: relative;
  color: #f2ead8;
  box-sizing: border-box;
  overflow: visible;
}

.panel {
  position: absolute;
  inset: 0;
  border-radius: 26px;
  background:
    radial-gradient(circle at 85% 8%, rgba(255, 193, 61, .07), transparent 34%),
    radial-gradient(circle at 12% 18%, rgba(132, 168, 78, .05), transparent 32%),
    linear-gradient(180deg, rgba(48, 52, 34, .34), rgba(10, 12, 8, .44));
  border: 3px solid rgba(190, 154, 72, .40);
  box-shadow:
    0 28px 44px rgba(0, 0, 0, .42),
    0 0 30px rgba(0, 0, 0, .28),
    inset 0 0 35px rgba(255, 200, 80, .035),
    inset 0 0 0 2px rgba(255, 255, 255, .03);
  overflow: hidden;
  backdrop-filter: blur(5px);
}

.panel::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(
      135deg,
      rgba(255,255,255,.014) 0px,
      rgba(255,255,255,.014) 1px,
      transparent 1px,
      transparent 8px
    );
  opacity: .22;
  pointer-events: none;
  z-index: 0;
}

.panel::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(90deg, rgba(0,0,0,.24), transparent 20%, transparent 80%, rgba(0,0,0,.24)),
    linear-gradient(180deg, rgba(255,255,255,.035), transparent 20%, rgba(0,0,0,.13));
  pointer-events: none;
  z-index: 0;
}

.header {
  position: relative;
  z-index: 2;
  height: 125px;
  margin: 18px 20px 0;
  border-radius: 19px;
  background:
    linear-gradient(180deg, rgba(87, 82, 47, .34), rgba(20, 22, 15, .43));
  border: 2px solid rgba(211, 169, 72, .38);
  box-shadow:
    inset 0 0 22px rgba(0, 0, 0, .34),
    0 8px 20px rgba(0, 0, 0, .20);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
  backdrop-filter: blur(4px);
}

.header::before {
  content: "★";
  position: absolute;
  left: 24px;
  top: 28px;
  font-size: 64px;
  color: rgba(240, 230, 185, .08);
}

.header::after {
  content: "▰";
  position: absolute;
  right: 28px;
  top: 34px;
  font-size: 62px;
  transform: rotate(-8deg);
  color: rgba(35, 35, 28, .26);
  text-shadow: 28px -12px 0 rgba(25, 25, 20, .18);
}

.title {
  position: relative;
  z-index: 3;
}

.title h1 {
  margin: 0;
  font-size: 31px;
  line-height: .95;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #ffffff;
  text-shadow:
    0 4px 0 #3b321e,
    0 0 18px rgba(255, 220, 140, .20),
    0 8px 18px rgba(0, 0, 0, .70);
}

.subtitle {
  margin-top: 14px;
  font-size: 30px;
  letter-spacing: 4px;
  color: #ffcc42;
  text-transform: uppercase;
  text-shadow:
    0 0 12px rgba(255, 190, 40, .34),
    0 3px 8px rgba(0,0,0,.70);
}

.stats {
  position: relative;
  z-index: 3;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 128px 146px;
  gap: 12px;
  margin: 18px 20px 18px;
}

.card {
  border-radius: 18px;
  position: relative;
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(43, 45, 29, .34), rgba(12, 14, 10, .43));
  border: 2px solid rgba(139, 116, 63, .36);
  box-shadow:
    inset 0 0 22px rgba(0, 0, 0, .36),
    inset 0 1px 0 rgba(255,255,255,.045),
    0 8px 20px rgba(0,0,0,.18);
  display: grid;
  grid-template-columns: 64px 1fr;
  align-items: center;
  padding: 10px 14px 28px 14px;
  box-sizing: border-box;
  backdrop-filter: blur(4px);
}

.card:not(.gold)::before {
  content: "";
  position: absolute;
  left: 16px;
  right: 16px;
  bottom: 11px;
  height: 4px;
  border-radius: 99px;
  background: var(--accent);
  box-shadow: 0 0 18px var(--accent);
  z-index: 1;
  pointer-events: none;
}

.card::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 0%, rgba(255,255,255,.04), transparent 42%);
  pointer-events: none;
  z-index: 0;
}

.icon {
  position: relative;
  z-index: 2;
  width: 60px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 52px;
  line-height: 1;
  filter: drop-shadow(0 6px 8px rgba(0,0,0,.65));
}

.info {
  position: relative;
  z-index: 2;
  min-width: 0;
  text-align: center;
  transform: translateY(-5px);
}

.label {
  font-size: 20px;
  line-height: 1;
  letter-spacing: .9px;
  text-transform: uppercase;
  color: var(--label);
  text-shadow: 0 2px 4px rgba(0,0,0,.75);
  white-space: nowrap;
  text-align: center;
}

.value {
  margin-top: 8px;
  font-size: 72px;
  line-height: .78;
  color: #fff7e8;
  text-align: center;
  text-shadow:
    0 4px 0 rgba(55,44,26,.95),
    0 0 18px rgba(255,255,255,.14),
    0 10px 18px rgba(0,0,0,.78);
}

.saved {
  --accent: #8fd050;
  --label: #9ee65b;
}

.lost {
  --accent: #e34b38;
  --label: #ff6254;
}

.gold {
  --accent: #ffc531;
  --label: #ffc531;

  grid-column: 1 / 3;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 4px 28px 12px 28px;
  text-align: center;
  min-height: 0;

  background:
    radial-gradient(circle at 50% 10%, rgba(255, 207, 68, .08), transparent 42%),
    linear-gradient(180deg, rgba(64, 50, 18, .30), rgba(18, 15, 8, .40));
  border-color: rgba(255, 199, 49, .38);
}

.gold::before {
  display: none !important;
}

.gold .icon {
  position: relative;
  z-index: 2;
  width: 82px;
  height: 82px;
  flex: 0 0 82px;
  font-size: 70px;
  margin-right: 22px;
  filter:
    drop-shadow(0 0 14px rgba(255, 195, 49, .24))
    drop-shadow(0 7px 9px rgba(0,0,0,.68));
}

.gold .info {
  position: relative;
  z-index: 2;
  flex: 0 1 auto;
  text-align: center;
  transform: translateY(-2px);
}

.gold .label {
  font-size: 21px;
  line-height: 1;
  text-align: center;
  color: #ffd152;
}

.gold .value {
  font-size: 76px;
  margin-top: 8px;
  line-height: .78;
  text-align: center;
  color: #fff3c4;
  text-shadow:
    0 5px 0 rgba(84, 55, 9, .95),
    0 0 20px rgba(255, 196, 49, .30),
    0 12px 20px rgba(0,0,0,.82);
}

.error {
  position: absolute;
  left: 32px;
  bottom: 8px;
  z-index: 5;
  font-size: 14px;
  color: #ff7777;
  text-shadow: 0 2px 4px #000;
  display: none;
}
</style>
</head>

<body>

<div class="scene">
  <div class="widget">
    <div class="panel">

      <div class="header">
        <div class="title">
          <h1>Врятувати рядового Раяна</h1>
          <div class="subtitle">SAXON та Яблучко</div>
        </div>
      </div>

      <div class="stats">

        <div class="card saved">
          <div class="icon">🫡</div>
          <div class="info">
            <div class="label">Врятовано</div>
            <div class="value" id="saved">0</div>
          </div>
        </div>

        <div class="card lost">
          <div class="icon">☠️</div>
          <div class="info">
            <div class="label">Не врятовано</div>
            <div class="value" id="lost">0</div>
          </div>
        </div>

        <div class="card gold">
          <div class="icon">🪙</div>
          <div class="info">
            <div class="label">К-ть золота до розіграшу</div>
            <div class="value" id="gold">0</div>
          </div>
        </div>

      </div>

      <div class="error" id="errorText">Помилка завантаження Google Таблиці</div>

    </div>
  </div>
</div>

<script>
/*
  Google Sheets:

  J2 = К-ть золота / розіграш
  K2 = Врятовано
  L2 = Не врятовано
*/

const SHEET_ID = "17phnEn-NW-OnrZg4DcW65r-Xoq6ScsdVjS5yL0SS3fk";
const GID = "148786084";
const RANGE = "J2:L2";

const UPDATE_INTERVAL = 10000;

const els = {
  gold: document.getElementById("gold"),
  saved: document.getElementById("saved"),
  lost: document.getElementById("lost"),
  error: document.getElementById("errorText")
};

function cleanValue(value) {
  if (value === null || value === undefined) return "0";
  return String(value).replace(/\s+/g, "").trim() || "0";
}

async function loadSheetData() {
  const url =
    `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?` +
    `gid=${GID}&range=${RANGE}&tqx=out:json&cacheBust=${Date.now()}`;

  try {
    const response = await fetch(url);
    const text = await response.text();

    const jsonText = text
      .replace("/*O_o*/", "")
      .replace("google.visualization.Query.setResponse(", "")
      .replace(/\);?\s*$/, "");

    const data = JSON.parse(jsonText);
    const row = data.table.rows[0];

    if (!row || !row.c) {
      throw new Error("Немає даних у діапазоні J2:L2");
    }

    const j2Gold = row.c[0]?.v ?? 0;
    const k2Saved = row.c[1]?.v ?? 0;
    const l2Lost = row.c[2]?.v ?? 0;

    els.gold.textContent = cleanValue(j2Gold);
    els.saved.textContent = cleanValue(k2Saved);
    els.lost.textContent = cleanValue(l2Lost);

    els.error.style.display = "none";

  } catch (err) {
    console.error("Google Sheets load error:", err);
    els.error.style.display = "block";
  }
}

loadSheetData();
setInterval(loadSheetData, UPDATE_INTERVAL);
</script>

</body>
</html>
